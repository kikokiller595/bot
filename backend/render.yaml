services:
  - type: web
    name: tby-loteria-backend
    runtime: node
    plan: free
    healthCheckPath: /ready
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: APP_TIMEZONE
        value: America/New_York
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INITIAL_ADMIN_SETUP_TOKEN
        sync: false
      - key: ALLOW_RESET_ADMIN
        value: "false"
      - key: FRONTEND_URL
        sync: false
